<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Carros</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container">
      <a class="navbar-brand" href="#">Carros</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarPrincipal" aria-controls="navbarPrincipal" aria-expanded="false" aria-label="Alternar navegacao">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarPrincipal">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Inicio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#lista-carros">Carros</a>
          </li>
        </ul>
        <div class="d-flex flex-column flex-lg-row gap-2 align-items-lg-center">
          <form class="d-flex" role="search">
            <input class="form-control me-2" type="search" placeholder="Buscar carro" aria-label="Buscar carro">
            <button class="btn btn-outline-success" type="submit">Buscar</button>
          </form>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-primary" type="button" data-bs-toggle="modal" data-bs-target="#loginModal">
              Login
            </button>
            <button class="btn btn-primary" type="button" data-bs-toggle="modal" data-bs-target="#registroModal">
              Registro
            </button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-4">
      <aside class="col-12 col-lg-3">
        <div class="accordion" id="filtrosAccordion">
          <div class="accordion-item">
            <h2 class="accordion-header" id="headingMarca">
              <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseMarca" aria-expanded="true" aria-controls="collapseMarca">
                Marcas
              </button>
            </h2>
            <div id="collapseMarca" class="accordion-collapse collapse show" aria-labelledby="headingMarca" data-bs-parent="#filtrosAccordion">
              <div class="accordion-body">
                Toyota, Honda, Chevrolet, Volkswagen, Hyundai e Fiat.
              </div>
            </div>
          </div>

          <div class="accordion-item">
            <h2 class="accordion-header" id="headingAno">
              <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseAno" aria-expanded="false" aria-controls="collapseAno">
                Faixa de ano
              </button>
            </h2>
            <div id="collapseAno" class="accordion-collapse collapse" aria-labelledby="headingAno" data-bs-parent="#filtrosAccordion">
              <div class="accordion-body">
                Modelos entre 2020 e 2024.
              </div>
            </div>
          </div>

          <div class="accordion-item">
            <h2 class="accordion-header" id="headingPreco">
              <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapsePreco" aria-expanded="false" aria-controls="collapsePreco">
                Faixa de preco
              </button>
            </h2>
            <div id="collapsePreco" class="accordion-collapse collapse" aria-labelledby="headingPreco" data-bs-parent="#filtrosAccordion">
              <div class="accordion-body">
                Valores entre R$ 89.490 e R$ 164.990.
              </div>
            </div>
          </div>
        </div>
      </aside>

      <section class="col-12 col-lg-9">
        <div id="lista-carros" class="row g-4"></div>

        <h2 class="mt-5 mb-3">Recomendacoes</h2>
        <div id="lista-recomendacoes" class="row g-4"></div>
      </section>
    </div>
  </main>

  <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="loginModalLabel">Entrar na conta</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <form>
          <div class="modal-body">
            <div class="mb-3">
              <label for="loginEmail" class="form-label">E-mail</label>
              <input type="email" class="form-control" id="loginEmail" required>
            </div>
            <div class="mb-3">
              <label for="loginSenha" class="form-label">Senha</label>
              <input type="password" class="form-control" id="loginSenha" required>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Entrar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="registroModal" tabindex="-1" aria-labelledby="registroModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="registroModalLabel">Criar conta</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <form>
          <div class="modal-body">
            <div class="mb-3">
              <label for="registroNome" class="form-label">Nome</label>
              <input type="text" class="form-control" id="registroNome" required>
            </div>
            <div class="mb-3">
              <label for="registroEmail" class="form-label">E-mail</label>
              <input type="email" class="form-control" id="registroEmail" required>
            </div>
            <div class="mb-3">
              <label for="registroSenha" class="form-label">Senha</label>
              <input type="password" class="form-control" id="registroSenha" required>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Cadastrar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <footer class="bg-body-tertiary border-top mt-5">
    <div class="container py-4 d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
      <p class="mb-0">Carros System</p>
      <p class="mb-0">Todos os direitos reservados</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="main.js"></script>
</body>
</html>
